<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    </head>
<body>
   
<div class="container mt-5">
  <h3 class="mb-4">Choisir vos formations</h3>
  <div id="formationsList"></div>
  <button class="btn btn-primary mt-3" onclick="calculer()">Calculer Total</button>

  <div class="mt-3 alert alert-info" id="result">
    Total : 0 DH
  </div>
  </div>



    


<script type="text/javascript">

    const formations=[{id:1,nom:'Javascript',prix:500},{id:2,nom:'PHP',prix:800}];
    $(formations).each(function(pos,f){
      $(`<div class="form-check">
          <input class="form-check-input" type="checkbox" value="${f.prix}">
          <label class="form-check-label">
            ${f.nom} (${f.prix} DH)
          </label>
        </div>
      `).appendTo($('#formationsList'));
    });
 
 const calculer=() =>{
  let total = 0;
  let checks = $(":checked");

  $(checks).each((pos,c) => {
    total += Number($(c).val());
  });
 $("#result").text("Total : " + total + " DH");
}




</script>


</body>
</html>
