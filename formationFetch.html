<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Calcul Total</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <h3 class="mb-4">Choisir vos formations</h3>

  <!-- Conteneur dynamique -->
  <div id="formationsList"></div>

  <button class="btn btn-primary mt-3" onclick="calculer()">Calculer Total</button>

  <div class="mt-3 alert alert-info" id="result">
    Total : 0 DH
  </div>
</div>

<script>
// Charger les données JSON
fetch("formations.json")
  .then(response => response.json())
  .then(data => {
    let container = document.getElementById("formationsList");

    data.forEach(f => {
      container.innerHTML += `
        <div class="form-check">
          <input class="form-check-input" type="checkbox" value="${f.prix}">
          <label class="form-check-label">
            ${f.nom} (${f.prix} DH)
          </label>
        </div>
      `;
    });
  })
  .catch(error => console.log("Erreur :", error));

// Calcul du total
function calculer() {
  let total = 0;
  let checks = document.querySelectorAll("input[type='checkbox']:checked");

  checks.forEach(c => {
    total += Number(c.value);
  });

  document.getElementById("result").innerText = "Total : " + total + " DH";
}
</script>

</body>
</html>
