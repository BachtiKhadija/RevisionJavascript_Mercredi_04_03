<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style type="text/css">
        .active{
            color:green;
            text-decoration: line-through;
        }
    </style>
     <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
   
   <script type="text/javascript">
     var taskList=JSON.parse(localStorage.getItem('tasks'))||[];
  const Render=()=>{
      $('#tasks').html('');
        $(taskList).each(function(pos,item){
            let ch=`<li class="list-group-item d-flex justify-content-between">`;
            ch+=`<span onclick="toggleStatus(${pos})" class=${item.status=='terminé'?'active':''}>${item.task}</span><div><button type="button" onclick="Supprimer(${pos})" class="btn btn-danger">delete</button>`
            ch+=`<button type="button" class="btn  btn-info" onclick="Edit(${pos})">Edit</button></div></li>`;


           $('#tasks').append($(ch));
      
        });

    }
 //mettre à jour Localstorage
   const setLS=()=>{
      localStorage.setItem('tasks',JSON.stringify(taskList));
    }
     function Edit(pos){
          newText=prompt('voulez vous modifier le text : '+taskList[pos].task+'?');
        taskList[pos].task=newText;
        setLS();
        Render();
        
        }
    const Supprimer=(pos)=>{
        //confirmation : sweetalert
        taskList.splice(pos,1);
        setLS();
        Render();
    }
    function toggleStatus(pos){
          taskList[pos].status=(taskList[pos].status=='en cours'?'terminé':'en cours');
          console.log(taskList[pos]);
          setLS();
          Render();
        }
   $(document).ready(function(){
      Render();
     $('#addBtn').click(function(event){
        let task=$("#task").val();
        if(task.trim()==""){
            alert('vous devez saisir une tâche !!!');
            return;}
            //uuid => permet de récupérer une valeur unique
        taskList.push({id:Date.now(),task,status:'en cours'});
        console.table(taskList);
        setLS();
        Render();
     });
           


   });



    </script>


    </head>
<body>
     <div class="container w-75  p-3 my-3 mx-auto">
        <div class="my-3 row w-75 mx-auto">
            <div class="col-8">
            <input type="text" class="form-control" id="task"></div>
            <div class="col-4"><button type="button" class="btn btn-primary" id="addBtn">Add</button></div>
        </div>
        <div class="row w-75 mx-auto p-0">
            <ul class="list-group" id="tasks">

            </ul>
        </div>
     </div>





<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
